# ============================================================
# API 余额查询插件 v1.1.0 — 配置
# ============================================================

[plugin]
name = "maibot_api_balance_plugin"
config_version = "1.1.0"
enabled = true

[settings]
timeout = 10
admin_only = true
admin_user_ids = []
output_format = "image"

# ----------------------------------------------------------
# API 平台列表（统一格式）
# 每个 [[api_instances]] 代表一个平台/账户，type 区分类型。
# 支持: deepseek / siliconflow / newapi / openrouter / moonshot / openai / onething / minimax
# ----------------------------------------------------------

